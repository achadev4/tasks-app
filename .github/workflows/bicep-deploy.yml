name: Deploy infrastructure (Bicep)

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: Azure resource group name (created if it does not exist)
        required: true
        default: rg-tasks
        type: string
      location:
        description: Azure region for the resource group (if creating) and deployment
        required: true
        default: southcentralus
        type: string
      secondary_location:
        description: Azure region for resources not available in the primary location
        required: true
        default: centralus
        type: string
      name_prefix:
        description: Resource name prefix (see infra/main.bicep)
        required: true
        default: tasks
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: bicep-deploy-${{ github.event.inputs.resource_group }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Bicep to Azure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure CLI Bicep
        run: az bicep version

      - name: Ensure resource group
        run: |
          az group create \
            --name "${{ github.event.inputs.resource_group }}" \
            --location "${{ github.event.inputs.location }}" \
            --output none

      - name: Deploy Bicep
        env:
          SQL_ADMIN_LOGIN: ${{ secrets.SQL_ADMIN_LOGIN }}
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
          API_APP_CLIENT_ID: ${{ secrets.API_APP_CLIENT_ID }}
        run: |
          set -euo pipefail
          az deployment group create \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --name "bicep-${{ github.run_id }}" \
            --template-file infra/main.bicep \
            --parameters \
              namePrefix="${{ github.event.inputs.name_prefix }}" \
              sqlAdminLogin="${SQL_ADMIN_LOGIN}" \
              sqlAdminPassword="${SQL_ADMIN_PASSWORD}" \
              apiAppClientId="${API_APP_CLIENT_ID}"

      - name: Show deployment outputs
        run: |
          az deployment group show \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --name "bicep-${{ github.run_id }}" \
            --query properties.outputs \
            --output json
