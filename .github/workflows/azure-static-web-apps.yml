name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: The branch or tag to deploy
        required: false
        default: main
        type: string
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    name: Determine target environment
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      env_suffix: ${{ steps.set-env.outputs.env_suffix }}
    steps:
      - name: Determine environment from branch
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "env_suffix=DEV" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/qa" ]]; then
            echo "environment=qa" >> $GITHUB_OUTPUT
            echo "env_suffix=QA" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/stg" ]]; then
            echo "environment=stg" >> $GITHUB_OUTPUT
            echo "env_suffix=STG" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "env_suffix=PROD" >> $GITHUB_OUTPUT
          else
            echo "Skipping deploy for non-target branch: ${{ github.ref }}"
            exit 1
          fi

  build:
    needs: determine-environment
    if: success()
    runs-on: ubuntu-latest
    name: Build
    environment: ${{ needs.determine-environment.outputs.environment }}
    env:
      ENV_SUFFIX: ${{ needs.determine-environment.outputs.env_suffix }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install and build
        env:
          VITE_AZURE_AD_TENANT_ID: ${{ secrets[format('VITE_AZURE_AD_TENANT_ID_{0}', env.ENV_SUFFIX)] }}
          VITE_AZURE_AD_API_SCOPE: ${{ secrets[format('VITE_AZURE_AD_API_SCOPE_{0}', env.ENV_SUFFIX)] }}
          VITE_AZURE_AD_CLIENT_ID: ${{ secrets[format('VITE_AZURE_AD_CLIENT_ID_{0}', env.ENV_SUFFIX)] }}
        run: npm ci && npm run build

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/

      - name: Prepare API deployment package
        run: |
          mkdir api-deploy
          cp api/host.json api-deploy/
          cp api/package.json api-deploy/
          cp -r api/dist api-deploy/

          # Rewrite package.json: remove workspace file: reference and devDependencies
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('api-deploy/package.json', 'utf8'));
            delete pkg.dependencies['@tasks-app/shared'];
            pkg.devDependencies = {};
            require('fs').writeFileSync('api-deploy/package.json', JSON.stringify(pkg, null, 2));
          "

          # Install production deps outside the workspace context
          cd api-deploy
          npm install --omit=dev

          # Copy the pre-built shared package
          mkdir -p node_modules/@tasks-app/shared
          cp -r ../packages/shared/dist node_modules/@tasks-app/shared/
          cp ../packages/shared/package.json node_modules/@tasks-app/shared/

      - name: Upload api artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: api-deploy/

  deploy_swa:
    needs: [determine-environment, build]
    if: success()
    runs-on: ubuntu-latest
    name: Deploy SWA (frontend)
    environment: ${{ needs.determine-environment.outputs.environment }}
    env:
      ENV_SUFFIX: ${{ needs.determine-environment.outputs.env_suffix }}
    steps:
      - name: Download client artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist/

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets[format('AZURE_STATIC_WEB_APPS_API_TOKEN_{0}', env.ENV_SUFFIX)] }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client/dist/
          skip_app_build: true

  deploy_api:
    needs: [determine-environment, build]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && success()
    runs-on: ubuntu-latest
    name: Deploy Function App (API)
    environment: ${{ needs.determine-environment.outputs.environment }}
    env:
      ENV_SUFFIX: ${{ needs.determine-environment.outputs.env_suffix }}
    steps:
      - name: Download api artifact
        uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: api-deploy/

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets[format('AZURE_CLIENT_ID_{0}', env.ENV_SUFFIX)] }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets[format('AZURE_FUNCTIONAPP_NAME_{0}', env.ENV_SUFFIX)] }}
          package: api-deploy/

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close SWA PR environment
    steps:
      - name: Close
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
