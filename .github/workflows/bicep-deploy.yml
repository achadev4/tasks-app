name: Deploy infrastructure (Bicep)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (dev, qa, stg, prod)
        required: true
        type: choice
        options:
          - dev
          - qa
          - stg
          - prod
      resource_group:
        description: Azure resource group name (created if it does not exist) - e.g., rg-tasks-dev, rg-tasks-qa, rg-tasks-stg, rg-tasks-prod
        required: true
        type: string
      location:
        description: Azure region for the resource group (if creating) and deployment
        required: true
        default: centralus
        type: string
      name_prefix:
        description: Resource name prefix (see infra/main.bicep)
        required: true
        default: tasks
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: bicep-deploy-${{ github.event.inputs.resource_group }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Bicep to Azure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure CLI Bicep
        run: az bicep version

      - name: Ensure resource group
        run: |
          az group create \
            --name "${{ github.event.inputs.resource_group }}" \
            --location "${{ github.event.inputs.location }}" \
            --output none

      - name: Deploy Bicep
        env:
          SQL_CONNECTION_STRING: ${{ secrets.SQL_CONNECTION_STRING }}
          API_APP_CLIENT_ID: ${{ secrets.API_APP_CLIENT_ID }}
        run: |
          set -euo pipefail
          az deployment group create \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --name "bicep-${{ github.run_id }}" \
            --template-file infra/main.bicep \
            --parameters \
              deployEnvironment="${{ github.event.inputs.environment }}" \
              namePrefix="${{ github.event.inputs.name_prefix }}" \
              sqlConnectionString="${SQL_CONNECTION_STRING}" \
              apiAppClientId="${API_APP_CLIENT_ID}"

      - name: Show deployment outputs
        run: |
          az deployment group show \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --name "bicep-${{ github.run_id }}" \
            --query properties.outputs \
            --output json
