name: Deploy infrastructure (Bicep)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (dev, qa, stg, prod)
        required: true
        type: choice
        options:
          - dev
          - qa
          - stg
          - prod
      resource_group:
        description: Azure resource group name (created if it does not exist)
        required: true
        default: rg-tasks-prod
        type: string
      location:
        description: Azure region for the resource group (if creating) and deployment
        required: true
        default: centralus
        type: string
      name_prefix:
        description: Resource name prefix (see infra/main.bicep)
        required: true
        default: tasks
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: bicep-deploy-${{ github.event.inputs.resource_group }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Bicep to Azure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure CLI Bicep
        run: az bicep version

      - name: Ensure resource group
        run: |
          az group create \
            --name "${{ github.event.inputs.resource_group }}" \
            --location "${{ github.event.inputs.location }}" \
            --output none

      - name: Set environment suffix
        id: env-suffix
        run: |
          case "${{ github.event.inputs.environment }}" in
            dev) echo "suffix=DEV" >> $GITHUB_OUTPUT ;;
            qa) echo "suffix=QA" >> $GITHUB_OUTPUT ;;
            stg) echo "suffix=STG" >> $GITHUB_OUTPUT ;;
            prod) echo "suffix=PROD" >> $GITHUB_OUTPUT ;;
          esac

      - name: Deploy Bicep
        env:
          SQL_CONNECTION_STRING: ${{ secrets[format('SQL_CONNECTION_STRING_{0}', steps.env-suffix.outputs.suffix)] }}
          API_APP_CLIENT_ID: ${{ secrets[format('API_APP_CLIENT_ID_{0}', steps.env-suffix.outputs.suffix)] }}
        run: |
          set -euo pipefail
          az deployment group create \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --name "bicep-${{ github.run_id }}" \
            --template-file infra/main.bicep \
            --parameters \
              deployEnvironment="${{ github.event.inputs.environment }}" \
              namePrefix="${{ github.event.inputs.name_prefix }}" \
              sqlConnectionString="${SQL_CONNECTION_STRING}" \
              apiAppClientId="${API_APP_CLIENT_ID}"

      - name: Show deployment outputs
        run: |
          az deployment group show \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --name "bicep-${{ github.run_id }}" \
            --query properties.outputs \
            --output json
